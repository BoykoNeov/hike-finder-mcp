name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full-coverage matrix on Linux: install every optional extra (mcp + rasterio)
  # so the importorskip-guarded suites (test_server, test_local_dem) actually run.
  test-linux:
    name: test (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with all extras
        # Editable install so the pyproject entry points land on PATH and the
        # launcher tests (which `which hike-finder`) exercise the wrappers instead
        # of skipping. local-dem pulls rasterio (manylinux wheels, no system GDAL).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,local-dem]"

      - name: Run test suite
        run: python -m pytest -q

  # Cross-platform smoke on the OS this project is developed on. rasterio is
  # omitted (heavier to wheel on Windows); test_local_dem skips cleanly. pwsh is
  # preinstalled on the runner, so the native .ps1 launchers are exercised here.
  test-windows:
    name: test (windows, py3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q
